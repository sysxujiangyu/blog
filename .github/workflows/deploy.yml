name: Build and Deploy
on: [push]
permissions:
contents: write
jobs:
	steps:
		- name: Checkout
			uses: actions/checkout@v4
		 
		- name: Install and Build
		run:
			npm ci
			npm run build
		 
		- name: Deploy
			uses: JamesIves/github-pages-deploy-action@v4
			with:
				folder: dist # The folder the action should deploy.