name: Blog Deploy Frontend
on:
  push:
    branches:
      - main  # 或者是你的默认发布分支
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2
 
      - name: Install 🔧
        run: npm install
 
      - name: Build 🏭
        run: npm run build
 
      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist  # 或者是你构建后的文件夹名称